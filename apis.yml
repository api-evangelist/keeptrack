aid: keeptrack
name: KeepTrack
description: >-
  Keep Track is the free, open source tool that makes space exploration accessible
  to all - professionals and amateurs alike. With its user-friendly interface, you
  can simulate satellite launches, visualize debris patterns, and explore a catalog
  of 30,000+ real satellites and debris. Zoom through geosynchronous orbits, run
  collision scenarios, and track debris fragmentation over time.
